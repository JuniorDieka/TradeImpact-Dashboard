<div class="dashboard-layout">
  <app-header></app-header>
  
  <div class="dashboard-content">
    <app-sidebar></app-sidebar>
    
    <main class="main-content">
      <div class="container">
        <h1>Sustainability Standards Browser</h1>
        
        <mat-card>
          <mat-card-content>
            <div *ngIf="loading" class="loading-container">
              <mat-spinner></mat-spinner>
            </div>

            <div *ngIf="!loading && standards.length > 0" class="standards-grid">
              <mat-card *ngFor="let standard of standards" class="standard-card">
                <mat-card-header>
                  <mat-card-title>{{ standard.name }}</mat-card-title>
                  <mat-card-subtitle>{{ standard.acronym }}</mat-card-subtitle>
                </mat-card-header>
                <mat-card-content>
                  <p>{{ standard.description }}</p>
                  <div class="chips-container">
                    <mat-chip-set>
                      <mat-chip *ngFor="let category of standard.hotspotCategories">
                        {{ category }}
                      </mat-chip>
                    </mat-chip-set>
                  </div>
                </mat-card-content>
              </mat-card>
            </div>

            <div *ngIf="!loading && standards.length === 0">
              <p>No standards found. Please seed the database.</p>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </main>
  </div>
</div>
